<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural TTS Synthesizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Combat Mode Transitions */
        body { transition: background-color 0.5s ease; }
        .combat-mode { background-color: #0f0505 !important; }
        .combat-mode-textarea { 
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); 
            border-color: #ef4444 !important;
        }
        /* Boss Health Bar */
        progress::-webkit-progress-bar { background-color: #374151; border-radius: 999px; }
        progress::-webkit-progress-value { background: linear-gradient(90deg, #f59e0b, #ef4444); border-radius: 999px; }
        progress::-moz-progress-bar { background: linear-gradient(90deg, #f59e0b, #ef4444); border-radius: 999px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans selection:bg-red-500 selection:text-white">

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-5 right-5 bg-red-600 text-white px-6 py-3 rounded shadow-lg hidden z-50 font-semibold"></div>

    <div class="container mx-auto max-w-4xl p-6 flex-grow flex flex-col">
        
        <!-- Header -->
        <header class="mb-8 flex justify-between items-end border-b border-gray-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">Neural TTS Synthesizer</h1>
                <p class="text-gray-400 text-sm mt-1">Google Cloud TTS & Gemini AI</p>
            </div>
            <div class="text-xs text-gray-500 bg-gray-800 px-3 py-1 rounded border border-gray-700">
                <kbd class="font-mono">Cmd/Ctrl + S</kbd> to synthesize
            </div>
        </header>

        <!-- Input Area -->
        <main class="flex-grow flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <label for="text-input" class="text-sm font-medium text-gray-300 uppercase tracking-wider">Input Text</label>
                <div class="text-xs text-gray-400 flex gap-4">
                    <span id="word-count">0 words</span>
                    <span id="est-duration">~0:00</span>
                </div>
            </div>
            
            <div class="relative flex-grow flex flex-col">
                <textarea id="text-input" 
                    class="w-full flex-grow bg-gray-800 border border-gray-700 rounded-lg p-4 text-gray-100 focus:outline-none focus:ring-2 focus:ring-purple-500 resize-none transition-all duration-300"
                    placeholder="Enter text to synthesize..."></textarea>
                
                <button id="clear-btn" class="absolute bottom-4 right-4 bg-gray-700 hover:bg-gray-600 text-xs px-3 py-1 rounded transition-colors">
                    Clear
                </button>
            </div>

            <button id="submit-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg shadow-lg transition-all flex justify-center items-center gap-2">
                <span id="btn-text">Synthesize Audio</span>
                <svg id="btn-spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </main>

        <!-- HUD / Results Area -->
        <section id="hud" class="mt-8 bg-gray-800 border border-gray-700 rounded-lg p-6 hidden flex-col gap-4 shadow-2xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse-fast"></div>
                    <span class="text-sm font-bold text-green-400 uppercase tracking-widest">Live Stream</span>
                </div>
                <div class="font-mono text-sm text-gray-300" id="live-timer">0:00 / 0:00</div>
            </div>

            <!-- Boss Health Bar -->
            <progress id="progress-bar" value="0" max="100" class="w-full h-3 rounded-full overflow-hidden"></progress>

            <!-- Visualizer -->
            <div class="w-full h-24 bg-gray-900 rounded border border-gray-700 overflow-hidden relative">
                <canvas id="visualizer" class="absolute inset-0 w-full h-full"></canvas>
            </div>

            <!-- Audio Player -->
            <audio id="audio-player" controls class="w-full mt-2 outline-none"></audio>
        </section>
    </div>

    <script>
        // Elements
        const textInput = document.getElementById('text-input');
        const wordCountEl = document.getElementById('word-count');
        const estDurationEl = document.getElementById('est-duration');
        const clearBtn = document.getElementById('clear-btn');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const hud = document.getElementById('hud');
        const audioPlayer = document.getElementById('audio-player');
        const liveTimer = document.getElementById('live-timer');
        const progressBar = document.getElementById('progress-bar');
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');

        // State
        let estimatedSeconds = 0;
        let audioCtx, analyser, source;
        let animationId;

        // Initialization
        textInput.value = localStorage.getItem('tts_text') || '';
        updateStats();

        // Event Listeners
        textInput.addEventListener('input', () => {
            localStorage.setItem('tts_text', textInput.value);
            updateStats();
        });

        clearBtn.addEventListener('click', () => {
            textInput.value = '';
            localStorage.removeItem('tts_text');
            updateStats();
            textInput.focus();
        });

        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 's') {
                e.preventDefault();
                submitForm();
            }
        });

        submitBtn.addEventListener('click', submitForm);

        // Audio Player Events
        audioPlayer.addEventListener('play', () => {
            document.body.classList.add('combat-mode');
            textInput.classList.add('combat-mode-textarea');
            clearBtn.classList.add('hidden');
        });

        audioPlayer.addEventListener('pause', () => {
            document.body.classList.remove('combat-mode');
            textInput.classList.remove('combat-mode-textarea');
            clearBtn.classList.remove('hidden');
        });

        audioPlayer.addEventListener('ended', () => {
            document.body.classList.remove('combat-mode');
            textInput.classList.remove('combat-mode-textarea');
            clearBtn.classList.remove('hidden');
            progressBar.value = 100;
        });

        audioPlayer.addEventListener('timeupdate', () => {
            const current = audioPlayer.currentTime;
            // Use actual duration if available and finite, else fallback to estimate
            const total = (audioPlayer.duration && isFinite(audioPlayer.duration)) 
                            ? audioPlayer.duration 
                            : estimatedSeconds;
            
            liveTimer.innerText = `${formatTime(current)} / ${formatTime(total)}`;
            
            if (total > 0) {
                progressBar.value = Math.min((current / total) * 100, 100);
            }
        });

        // Functions
        function updateStats() {
            const text = textInput.value.trim();
            const words = text ? text.split(/\s+/).length : 0;
            wordCountEl.innerText = `${words} word${words !== 1 ? 's' : ''}`;
            
            // 150 words per minute
            estimatedSeconds = Math.ceil((words / 150) * 60);
            estDurationEl.innerText = `~${formatTime(estimatedSeconds)}`;
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            toast.classList.add('animate-shake');
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('animate-shake');
            }, 4000);
        }

        async function submitForm() {
            const text = textInput.value.trim();
            if (!text) {
                showToast("Please enter some text first.");
                return;
            }

            // UI Loading State
            submitBtn.disabled = true;
            btnText.innerText = "Preparing Stream...";
            btnSpinner.classList.remove('hidden');
            hud.classList.add('hidden');
            progressBar.value = 0;
            liveTimer.innerText = `0:00 / ${formatTime(estimatedSeconds)}`;

            try {
                const res = await fetch('/prepare_stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || "Failed to prepare stream");
                }

                // Setup Audio
                hud.classList.remove('hidden');
                hud.classList.add('flex');
                audioPlayer.src = data.stream_url;
                
                // Initialize Web Audio API (requires user gesture, which we have here)
                initVisualizer();

                try {
                    await audioPlayer.play();
                } catch (playErr) {
                    console.warn("Autoplay prevented:", playErr);
                    showToast("Click play on the audio player to start.");
                }

            } catch (err) {
                showToast(err.message);
            } finally {
                submitBtn.disabled = false;
                btnText.innerText = "Synthesize Audio";
                btnSpinner.classList.add('hidden');
            }
        }

        // Visualizer Logic
        function initVisualizer() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                
                source = audioCtx.createMediaElementSource(audioPlayer);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
                drawVisualizer();
            }
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }

        function drawVisualizer() {
            animationId = requestAnimationFrame(drawVisualizer);
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            // Clear canvas (Tailwind gray-900)
            canvasCtx.fillStyle = '#111827';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / bufferLength) * 2.5;
            let barHeight;
            let x = 0;

            for(let i = 0; i < bufferLength; i++) {
                barHeight = dataArray[i] / 2;
                
                // Gradient from purple to red based on height
                const r = barHeight + 100;
                const g = 50;
                const b = 250 - barHeight;
                
                canvasCtx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                
                x += barWidth + 1;
            }
        }
    </script>
</body>
</html>
