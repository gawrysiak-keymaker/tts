<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynthApp - Liquid Stream fast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 5px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen flex justify-center items-start p-6 antialiased">

    <div class="w-full max-w-4xl bg-gray-800 rounded-2xl shadow-2xl p-8 space-y-6 border border-gray-700">
        
        <header class="text-center">
            <h1 class="text-3xl font-semibold text-white tracking-tight">SynthApp <span class="text-blue-500">Liquid</span></h1>
            <p class="text-gray-400 text-sm mt-1">WaveNet Classic • Cmd+S to Play</p>
        </header>

        {% if not tts_enabled %}
        <div class="bg-red-900/50 border border-red-500 text-red-200 p-4 rounded-lg text-center font-medium">
            TTS Service is offline. Check your Google Cloud JSON key.
        </div>
        {% endif %}

        <form id="tts-form" class="space-y-6">
            <div class="space-y-2">
                <div class="flex justify-between items-end px-1">
                    <label for="text-input" class="text-sm font-medium text-gray-400">Paste your text here</label>
                    <button type="button" id="clear-btn" class="text-sm text-gray-400 hover:text-white transition">Clear</button>
                </div>
                <textarea id="text-input" name="text" required
                    class="w-full h-80 p-6 bg-gray-950 text-gray-100 border border-gray-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-xl leading-relaxed resize-y"
                    placeholder="Drop your text here..."></textarea>
            </div>

            <button type="submit" id="convert-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold text-lg py-4 rounded-lg shadow-lg hover:shadow-blue-500/25 transition-all transform active:scale-95 flex justify-center items-center">
                <span id="btn-text">Synthesize & Stream (Cmd+S)</span>
            </button>
        </form>

        <div id="results-area" class="hidden mt-6 p-6 bg-gray-900 rounded-xl border border-gray-700 shadow-inner">
            <p id="status-text" class="text-sm text-blue-400 mb-3 font-medium">Streaming connection active...</p>
            <audio id="audio-player" controls class="w-full rounded-lg outline-none"></audio>
        </div>
    </div>

    <script>
        const form = document.getElementById('tts-form');
        const textInput = document.getElementById('text-input');
        const convertBtn = document.getElementById('convert-btn');
        const btnText = document.getElementById('btn-text');
        const resultsArea = document.getElementById('results-area');
        const audioPlayer = document.getElementById('audio-player');
        const clearBtn = document.getElementById('clear-btn');
        const statusText = document.getElementById('status-text');

        // Restore text from memory
        textInput.value = localStorage.getItem('synthText') || '';
        textInput.addEventListener('input', () => {
            localStorage.setItem('synthText', textInput.value);
        });

        clearBtn.addEventListener('click', () => {
            textInput.value = '';
            localStorage.setItem('synthText', '');
            resultsArea.classList.add('hidden');
            audioPlayer.src = '';
        });

        // --- THE MACRO: Cmd+S or Ctrl+S ---
        window.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 's') {
                e.preventDefault(); // Stop the browser from trying to "Save Page As HTML"
                if (!convertBtn.disabled) {
                    convertBtn.click(); // Trigger the button click programmatically
                }
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            convertBtn.disabled = true;
            convertBtn.classList.replace('bg-blue-600', 'bg-gray-600');
            btnText.innerText = 'Opening Liquid Pipe...';
            resultsArea.classList.add('hidden');

            const formData = new FormData(form);

            try {
                // Step 1: Get the Ticket
                const response = await fetch('/prepare_stream', { method: 'POST', body: formData });
                const data = await response.json();

                if (response.ok) {
                    // Step 2: Plug the Ticket into the Audio Player
                    resultsArea.classList.remove('hidden');
                    audioPlayer.src = data.stream_url;
                    
                    // Step 3: Instantly play. It will start speaking before the file finishes generating!
                    audioPlayer.play(); 
                    
                } else {
                    alert("Error: " + data.error);
                }
            } catch (err) {
                alert("Network error occurred.");
            } finally {
                convertBtn.disabled = false;
                convertBtn.classList.replace('bg-gray-600', 'bg-blue-600');
                btnText.innerText = 'Synthesize & Stream (Cmd+S)';
            }
        });
    </script>
</body>
</html>
