<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynthApp - Liquid Stream ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 5px; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        
        /* Smooth transitions for Combat Mode */
        .combat-glow {
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.4);
            border-color: #3b82f6 !important;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen flex justify-center items-start p-6 antialiased relative overflow-hidden transition-colors duration-700" id="app-body">

    <!-- THE ERROR TOAST -->
    <div id="error-toast" class="absolute top-5 right-5 bg-red-600/90 backdrop-blur-md text-white px-6 py-4 rounded-xl shadow-2xl transform transition-all duration-300 -translate-y-20 opacity-0 flex items-center gap-3 z-50 border border-red-400">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        <span id="error-toast-text" class="font-medium tracking-wide">Connection lost.</span>
    </div>

    <div class="w-full max-w-4xl bg-gray-800 rounded-2xl shadow-2xl p-8 space-y-6 border border-gray-700 relative z-10 transition-all duration-500" id="main-container">
        
        <header class="text-center">
            <h1 class="text-3xl font-semibold text-white tracking-tight">SynthApp <span class="text-blue-500">Liquid</span></h1>
            <p class="text-gray-400 text-sm mt-1">WaveNet Classic • Cmd+S to Play</p>
        </header>

        {% if not tts_enabled %}
        <div class="bg-red-900/50 border border-red-500 text-red-200 p-4 rounded-lg text-center font-medium animate-pulse">
            TTS Service is offline. Check your Google Cloud JSON key.
        </div>
        {% endif %}

        <form id="tts-form" class="space-y-6">
            <div class="space-y-2 relative">
                <div class="flex justify-between items-end px-1">
                    <label for="text-input" class="text-sm font-medium text-gray-400 transition-opacity duration-300" id="text-label">Active Reading Zone</label>
                    <button type="button" id="clear-btn" class="text-sm text-gray-400 hover:text-red-400 transition-all duration-300">Clear Text</button>
                </div>
                
                <!-- The Text Box (Becomes the Combat Zone) -->
                <textarea id="text-input" name="text" required
                    class="w-full h-80 p-6 bg-gray-950 text-gray-100 border border-gray-700 rounded-xl outline-none transition-all duration-500 text-xl leading-relaxed resize-y"
                    placeholder="Drop your text here..."></textarea>
            </div>

            <!-- The Cast Button -->
            <button type="submit" id="convert-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold text-lg py-4 rounded-lg shadow-lg hover:shadow-blue-500/25 transition-all duration-150 transform active:scale-95 flex justify-center items-center relative overflow-hidden">
                <span id="btn-text">Synthesize & Stream (Cmd+S)</span>
                
                <svg id="loading-spinner" class="hidden animate-spin absolute right-6 h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <!-- The Loot Drop & Audio Timeline -->
        <div id="results-area" class="hidden mt-6 p-6 bg-gray-900 rounded-xl border border-gray-700 shadow-inner transition-opacity duration-500 opacity-0">
            <div class="flex justify-between items-center mb-3">
                <p id="status-text" class="text-sm text-blue-400 font-medium flex items-center gap-2">
                    <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span></span>
                    Neural Stream Connected
                </p>
            </div>
            
            <!-- THE AUDIO TIMELINE VISUALIZER -->
            <canvas id="audio-visualizer" class="w-full h-16 bg-gray-950 rounded-lg mb-4 border border-gray-800 shadow-inner"></canvas>
            
            <audio id="audio-player" controls class="w-full rounded-lg outline-none"></audio>
        </div>
    </div>

    <!-- UI ALCHEMY (JavaScript) -->
    <script>
        const form = document.getElementById('tts-form');
        const textInput = document.getElementById('text-input');
        const convertBtn = document.getElementById('convert-btn');
        const btnText = document.getElementById('btn-text');
        const loadingSpinner = document.getElementById('loading-spinner');
        const resultsArea = document.getElementById('results-area');
        const audioPlayer = document.getElementById('audio-player');
        const clearBtn = document.getElementById('clear-btn');
        const errorToast = document.getElementById('error-toast');
        const errorToastText = document.getElementById('error-toast-text');
        
        const canvas = document.getElementById('audio-visualizer');
        const canvasCtx = canvas.getContext('2d');

        // --- THE AUDIO SYNTHESIZER (Pure Math UI Sounds) ---
        let audioCtx;
        let analyser;
        let source;
        let isAudioSetup = false;

        function initAudioEngine() {
            if (!isAudioSetup) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source = audioCtx.createMediaElementSource(audioPlayer);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                isAudioSetup = true;
            }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        }

        function playUISound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'click') {
                // Low mechanical thud
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'ping') {
                // High-tech success ping
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // --- THE AUDIO TIMELINE (Visualizer) ---
        function drawVisualizer() {
            if (audioPlayer.paused) return; // Stop drawing when paused
            
            requestAnimationFrame(drawVisualizer);
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            canvasCtx.fillStyle = '#030712'; // Tailwind gray-950
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / bufferLength) * 2.5;
            let barHeight;
            let x = 0;

            for(let i = 0; i < bufferLength; i++) {
                barHeight = dataArray[i] / 2;
                // Cyberpunk blue bars
                canvasCtx.fillStyle = `rgb(${barHeight + 50}, 130, 246)`;
                canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }

        // --- COMBAT MODE (State Shifts) ---
        audioPlayer.onplay = () => {
            // Dim background, glow text box, hide clear button
            document.getElementById('app-body').classList.add('bg-gray-950');
            textInput.classList.add('combat-glow');
            clearBtn.classList.add('opacity-0', 'pointer-events-none');
            
            // Fix canvas resolution
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            drawVisualizer();
        };

        audioPlayer.onpause = () => {
            document.getElementById('app-body').classList.remove('bg-gray-950');
            textInput.classList.remove('combat-glow');
            clearBtn.classList.remove('opacity-0', 'pointer-events-none');
        };

        audioPlayer.onended = () => { audioPlayer.onpause(); };

        // Restore text from memory
        textInput.value = localStorage.getItem('synthText') || '';
        textInput.addEventListener('input', () => {
            localStorage.setItem('synthText', textInput.value);
        });

        clearBtn.addEventListener('click', () => {
            textInput.value = '';
            localStorage.setItem('synthText', '');
            resultsArea.classList.add('hidden');
            resultsArea.classList.replace('opacity-100', 'opacity-0');
            audioPlayer.src = '';
        });

        function showError(message) {
            errorToastText.innerText = message;
            errorToast.classList.remove('-translate-y-20', 'opacity-0');
            errorToast.classList.add('translate-y-0', 'opacity-100', 'animate-shake');
            setTimeout(() => { errorToast.classList.remove('animate-shake'); }, 400);
            setTimeout(() => {
                errorToast.classList.remove('translate-y-0', 'opacity-100');
                errorToast.classList.add('-translate-y-20', 'opacity-0');
            }, 4000);
        }

        // THE MACRO WITH HAPTIC AUDIO
        window.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 's') {
                e.preventDefault(); 
                if (!convertBtn.disabled) {
                    initAudioEngine(); // Wake up audio context
                    playUISound('click'); // Play thud sound
                    
                    textInput.classList.add('bg-gray-800');
                    convertBtn.classList.add('scale-95');
                    
                    setTimeout(() => {
                        textInput.classList.remove('bg-gray-800');
                        convertBtn.classList.remove('scale-95');
                    }, 150);

                    convertBtn.click(); 
                }
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            initAudioEngine(); // Ensure audio is awake for mouse-clickers
            playUISound('click');
            
            convertBtn.disabled = true;
            convertBtn.classList.replace('bg-blue-600', 'bg-gray-700');
            convertBtn.classList.remove('hover:bg-blue-500', 'hover:shadow-blue-500/25');
            btnText.innerText = 'Synthesizing...';
            loadingSpinner.classList.remove('hidden');
            
            resultsArea.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => resultsArea.classList.add('hidden'), 300);

            const formData = new FormData(form);

            try {
                const response = await fetch('/prepare_stream', { method: 'POST', body: formData });
                const data = await response.json();

                if (response.ok) {
                    playUISound('ping'); // Success! Play radio ping
                    
                    resultsArea.classList.remove('hidden');
                    setTimeout(() => resultsArea.classList.replace('opacity-0', 'opacity-100'), 50);
                    
                    audioPlayer.src = data.stream_url;
                    audioPlayer.play(); 
                    
                } else {
                    showError("Server Error: " + data.error);
                }
            } catch (err) {
                showError("Network error. Check your connection.");
            } finally {
                convertBtn.disabled = false;
                convertBtn.classList.replace('bg-gray-700', 'bg-blue-600');
                convertBtn.classList.add('hover:bg-blue-500', 'hover:shadow-blue-500/25');
                btnText.innerText = 'Synthesize & Stream (Cmd+S)';
                loadingSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
